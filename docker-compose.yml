services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - notes_net

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notes_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-9080}:80"
    depends_on:
      - app
    networks:
      - notes_net

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: notes-jenkins:local
    restart: unless-stopped
    ports:
      - "${JENKINS_HTTP_PORT:-8081}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - notes_net

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    depends_on:
      - jenkins
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: http jenkins:8080
    ports:
      - "4040:4040"
    networks:
      - notes_net
    profiles:
      - dev

volumes:
  postgres_data:
  jenkins_home:

networks:
  notes_net:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      # אפשר POSTGRES_HOST_PORT=15432 כדי להרים DB נוסף כש־5432 תפוס (למשל בדיקות CI במקביל לסטאק מקומי).
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - notes_net

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notes_net

  # pytest מול Postgres אמיתי — מופעל רק עם profile ci (למשל ב-Jenkins).
  app-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notes_net
    profiles:
      - ci

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-9080}:80"
    depends_on:
      - app
    networks:
      - notes_net

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: notes-jenkins:local
    restart: unless-stopped
    # Docker Desktop:socket often root:root (660) → need gid 0. Linux: often docker gid 999 or 1001.
    group_add:
      - "0"
      - "999"
      - "1001"
    ports:
      - "${JENKINS_HTTP_PORT:-8081}:8080"
      - "${JENKINS_AGENT_PORT:-50000}:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      # Host Docker socket — same engine as Docker Desktop; image must include docker CLI
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - notes_net

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    depends_on:
      - jenkins
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    command: http jenkins:8080
    ports:
      - "4040:4040"
    networks:
      - notes_net
    profiles:
      - dev

volumes:
  postgres_data:
  jenkins_home:

networks:
  notes_net:
    driver: bridge
